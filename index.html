<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Stakeholder Session Tool</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f8f9fb;
      color: #222;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      margin-bottom: 28px;
      color: #666;
    }

    .section {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    input, textarea, select, button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    textarea {
      min-height: 90px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .button-row.single {
      grid-template-columns: 1fr;
    }

    button.primary {
      background: #1f6feb;
      color: white;
      border: none;
    }

    button.secondary {
      background: #eef2ff;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-card {
      background: #f8fafc;
      border: 1px solid #dbe3ea;
      border-radius: 8px;
      padding: 14px;
    }

    .detail-card.full {
      grid-column: 1 / -1;
    }

    .result-panel {
      padding: 18px;
      background: #f9fafb;
      border: 1px solid #ddd;
      border-radius: 8px;
      min-height: 240px;
    }

    /* NEW EXECUTIVE STYLE */

    .summary-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .summary-card h3 {
      margin-top: 0;
      color: #111827;
    }

    .summary-content {
      margin-top: 10px;
      color: #374151;
      line-height: 1.6;
    }

    .summary-content ul {
      margin-left: 20px;
    }
  </style>
</head>

<body>

<h1>Stakeholder Session Tool</h1>
<div class="subtitle">Capture discovery sessions and generate AI architecture summaries.</div>

<!-- 1 -->
<div class="section">
  <h2>1. New Session</h2>

  <label>Project Name</label>
  <input id="project_name">

  <label>Stakeholder</label>
  <input id="stakeholder_name">

  <label>Date</label>
  <input type="date" id="session_date">

  <label>Process</label>
  <textarea id="process_overview"></textarea>

  <label>Data Sources</label>
  <textarea id="data_sources"></textarea>

  <label>Data Flow</label>
  <textarea id="data_flow"></textarea>

  <label>Logic</label>
  <textarea id="business_logic"></textarea>

  <label>KPIs</label>
  <textarea id="outputs_kpis"></textarea>

  <label>Pain Points</label>
  <textarea id="pain_points"></textarea>

  <label>Validation</label>
  <textarea id="validation_rules"></textarea>

  <label>Adoption</label>
  <textarea id="adoption_concerns"></textarea>

  <div class="button-row single">
    <button class="primary" onclick="saveSession()">Save Session</button>
  </div>
</div>

<!-- 2 -->
<div class="section">
  <h2>2. Saved Sessions</h2>

  <button class="secondary" onclick="loadSessions()">Load Sessions</button>

  <label>Select Session</label>
  <select id="session_select" onchange="handleSessionChange()">
    <option>Select</option>
  </select>

  <div class="button-row">
    <button onclick="viewStoredSummary()">View</button>
    <button class="primary" onclick="generateSummary()">Generate</button>
  </div>
</div>

<!-- 3 -->
<div class="section">
  <h2>3. Session Details</h2>
  <div class="details-grid">
    <div class="detail-card"><b>Project</b><br><span id="d_project">-</span></div>
    <div class="detail-card"><b>Stakeholder</b><br><span id="d_stakeholder">-</span></div>
    <div class="detail-card"><b>Date</b><br><span id="d_date">-</span></div>
    <div class="detail-card"><b>Status</b><br><span id="d_status">-</span></div>
    <div class="detail-card full"><b>ID</b><br><span id="d_id">-</span></div>
  </div>
</div>

<!-- 4 -->
<div class="section">
  <h2>4. AI Output</h2>
  <div id="result" class="result-panel">Ready</div>
</div>

<script>

const API = "https://wnv34myjrb.execute-api.us-east-2.amazonaws.com";
let sessionsCache = [];

/* FORMAT TO EXECUTIVE CARDS */
function formatSummary(text) {
  if (!text) return "<p>No summary available.</p>";

  const sections = text.split(/\n## /);

  let html = "";

  sections.forEach(section => {
    let lines = section.split("\n");
    let title = lines[0].replace("# ", "");
    let content = lines.slice(1).join("\n");

    content = content.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    content = content.replace(/^- (.*)/gim, "<li>$1</li>");
    content = content.replace(/(<li>.*<\/li>)/gim, "<ul>$1</ul>");
    content = content.replace(/\n/g, "<br>");

    html += `
      <div class="summary-card">
        <h3>${title}</h3>
        <div class="summary-content">${content}</div>
      </div>
    `;
  });

  return html;
}

/* SAVE */
async function saveSession() {
  const payload = {
    project_name: project_name.value,
    stakeholder_name: stakeholder_name.value,
    session_date: session_date.value,
    process_overview: process_overview.value,
    data_sources: data_sources.value,
    data_flow: data_flow.value,
    business_logic: business_logic.value,
    outputs_kpis: outputs_kpis.value,
    pain_points: pain_points.value,
    validation_rules: validation_rules.value,
    adoption_concerns: adoption_concerns.value
  };

  await fetch(API + "/sessions", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  result.innerText = "Saved ✔️";
  loadSessions();
}

/* LOAD */
async function loadSessions() {
  const res = await fetch(API + "/sessions");
  const data = await res.json();

  sessionsCache = data.items || [];

  session_select.innerHTML = "<option>Select</option>";

  sessionsCache.forEach(s => {
    let o = document.createElement("option");
    o.value = s.session_id;
    o.textContent = `${s.project_name} | ${s.session_id}`;
    session_select.appendChild(o);
  });

  result.innerText = "Sessions loaded ✔️";
}

/* SELECT */
function handleSessionChange() {
  const s = sessionsCache.find(x => x.session_id === session_select.value);
  if (!s) return;

  d_project.innerText = s.project_name;
  d_stakeholder.innerText = s.stakeholder_name;
  d_date.innerText = s.session_date;
  d_status.innerText = s.status;
  d_id.innerText = s.session_id;
}

/* VIEW */
async function viewStoredSummary() {
  const id = session_select.value;

  const res = await fetch(API + "/sessions/" + id);
  const data = await res.json();

  result.innerHTML = formatSummary(data.ai_deliverable);
}

/* GENERATE */
async function generateSummary() {
  const id = session_select.value;

  result.innerText = "Generating...";

  const res = await fetch(API + "/generate-summary", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({session_id: id})
  });

  const data = await res.json();

  result.innerHTML = formatSummary(data.summary);
}

</script>

</body>
</html>
